<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bergen Trail Journal</title>
  </head>
  <body>
    <main class="container">
      <section class="hero">
          <p class="eyebrow">Bergen Trail Journal</p>
          
          <h1>Discover Bergen <br> One Trail at a Time</h1>

          <p class="hero-text">
            A personal collection of hikes, mountain views and outdoor adventures.
          </p>

          <a href="" class="hero-btn">Explore Trails</a>
      </section>

      <section class="stats">
        <h2>Your Hiking Stats</h2>
        <div id="stats-container"></div>
      </section>

      <section class="completed-hikes">
        <h2>Completed Hikes</h2>
        <div id="completed-hikes-container"></div>
      </section>

      <section class="planned-hikes">
        <h2>Planned Hikes</h2>
        <div id="planned-hikes-container"></div>
      </section>

    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
